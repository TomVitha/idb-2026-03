<section>
  <div class="container">
    <div class="wall">
      <div class="contact-box-text">
        <h3 class="thin">Odběr novinek Iniciativy pro dostupně bydlení</h3>
        <p>Vyplňte níže uvedená pole pro zaslání novinek.</p>
      </div>
      <div class="contact-box-form">
        <div class="contact-form">
          <div>
            <input data-mail-label="jmeno" name="jmeno" class="contact-form--name" type="text" placeholder="Jméno" required />
          </div>
          <div>
            <input data-mail-label="email" name="email" class="contact-form--email" type="email" placeholder="E-mail" required />
          </div>

          <div class="form--buttons">
            <div class="form-check ">
              <input type="checkbox" id="gdprInfo" name="gdprInfo" class="form-check-input" required>
              <label for="gdprInfo" class="form-check-label">Souhlasím se zpracováním osobních údajů.
              </label>
            </div>
            <button class="btn btn--primary" type="submit">REGISTROVAT</button>
          </div>
          <!-- <div class="g-recaptcha"></div> -->
          <div id="messageSuccess">Vaše registrace byla úspěšně odeslána.</div>
          <div id="messageSending">Vaše registrace se právě odesílá.</div>
          <div id="messageFailure">Něco se pokazilo, zkuste to prosím znovu.</div>
        </div>
      </div>
    </div>
  </div>
</section>

<link rel="stylesheet" type="text/css" href="./storage/IDB/css/registration-form.css">
